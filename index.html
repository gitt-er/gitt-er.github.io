<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Blog</title>
<style>
  :root{
    --bg:#0b0f17;
    --card:#111827;
    --muted:#9ca3af;
    --text:#e5e7eb;
    --accent:#6366f1;
    --border:#1f2937;
  }

  *{box-sizing:border-box;margin:0;padding:0;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;}

  body{
    background:radial-gradient(circle at top, #111827, var(--bg));
    color:var(--text);
    min-height:100vh;
  }

  header{
    padding:60px 20px 30px;
    text-align:center;
  }

  header h1{
    font-size:42px;
    letter-spacing:-1px;
  }

  header p{
    color:var(--muted);
    margin-top:10px;
  }

  .container{
    max-width:1000px;
    margin:0 auto;
    padding:20px;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:18px;
  }

  .card{
    background:linear-gradient(180deg, #111827, #0f172a);
    border:1px solid var(--border);
    padding:18px;
    border-radius:16px;
    cursor:pointer;
    transition:transform .2s ease, border .2s ease;
    position:relative;
    overflow:hidden;
  }

  .card:hover{
    transform:translateY(-6px);
    border-color:#374151;
  }

  .tag{
    font-size:11px;
    color:var(--accent);
    letter-spacing:1px;
    text-transform:uppercase;
  }

  .card h2{
    margin-top:10px;
    font-size:18px;
  }

  .card p{
    margin-top:10px;
    color:var(--muted);
    font-size:14px;
    line-height:1.5;
  }

  /* modal */
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
  }

  .modal{
    background:var(--card);
    border:1px solid var(--border);
    max-width:700px;
    width:100%;
    border-radius:18px;
    padding:22px;
    animation:pop .2s ease;
  }

  @keyframes pop{
    from{transform:scale(.9);opacity:0;}
    to{transform:scale(1);opacity:1;}
  }

  .modal h2{
    margin-bottom:10px;
  }

  .modal pre{
    white-space:pre-wrap;
    color:#d1d5db;
    line-height:1.6;
    font-size:14px;
  }

  .close{
    margin-top:20px;
    background:var(--accent);
    border:none;
    padding:10px 14px;
    border-radius:10px;
    color:white;
    cursor:pointer;
    float:right;
  }

  footer{
    text-align:center;
    padding:40px;
    color:var(--muted);
    font-size:13px;
  }
</style>
</head>
<body>

<header>
  <h1>My Thoughts</h1>
  <p>Tech, systems, and ideas that shape how we think and build</p>
</header>

<div class="container">
  <div class="grid" id="grid"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="title"></h2>
    <div class="tag" id="tag"></div>
    <pre id="content"></pre>
    <button class="close" onclick="closeModal()">Close</button>
  </div>
</div>

<footer>
  Built with pure HTML/CSS/JS • GitHub Pages ready
</footer>

<script>
const posts = [
  {
    title: "The Myth of Productivity: Why Doing Less Wins More",
    tag: "Leverage",
    excerpt: "Most people optimize for activity. High performers optimize for removal.",
    content: `
Productivity is usually misunderstood as output maximization.

But real leverage comes from constraint removal.

Core idea:
- More work ≠ more progress
- Clarity scales, effort doesn’t

Principles:
- Reduce decision fatigue by defaulting decisions
- Eliminate low-leverage tasks aggressively
- Protect deep work as a non-renewable resource

The highest-performing systems are not busy.
They are *quiet and precise*.
`
  },
  {
    title: "System Design Thinking for Everyday Life",
    tag: "Systems",
    excerpt: "Your life behaves like a distributed system under load.",
    content: `
Life becomes easier when you stop seeing it as chaos and start seeing it as architecture.

Model it like a system:

Inputs → messages, tasks, obligations  
CPU → attention and focus  
Memory → cognitive load and emotional residue  

Key system patterns:
- Backpressure: refuse input when overloaded
- Caching: avoid recomputing decisions
- Retry logic: recover quickly from failure
- Observability: notice what drains you

Once you see systems, problems stop being emotional—they become structural.
`
  },
  {
    title: "Consistency Beats Motivation",
    tag: "Behavior",
    excerpt: "Motivation is volatile. Systems are stable.",
    content: `
Motivation is a spike. Consistency is a curve.

What actually compounds:
- Minimum viable effort done daily
- Environmental design that removes friction
- Identity-based habits instead of goal chasing

You don’t rise to motivation.
You fall to your systems.

And systems always win long-term.
`
  },
  {
    title: "Most People Don’t Lack Time — They Lack Constraints",
    tag: "Focus",
    excerpt: "Freedom without structure collapses into noise.",
    content: `
Time isn’t the limiting factor. Structure is.

Without constraints:
- Everything feels optional
- Nothing feels urgent
- Attention fragments

Constraints create clarity:
- Fixed work windows
- Defined “no” list
- Explicit priorities

Paradoxically, the more you constrain your time,
the more freedom you actually experience.
`
  },
  {
    title: "Attention is the Only Real Currency",
    tag: "Cognition",
    excerpt: "Everything you want costs attention, not time.",
    content: `
Time is abundant. Attention is not.

Every system competes for it:
- Notifications
- Social feeds
- Internal distractions

But attention behaves like capital:
- It compounds when focused
- It decays when fragmented

Guard it like infrastructure:
- Reduce entry points
- Batch interruptions
- Design friction into distractions
`
  },
  {
    title: "Why Simplicity Is a Competitive Advantage",
    tag: "Design",
    excerpt: "Complexity looks smart. Simplicity wins.",
    content: `
Complex systems feel impressive but fail quietly.

Simple systems:
- Scale easier
- Break less
- Adapt faster

Hard truth:
Most complexity is accidental.

Great builders remove:
- unnecessary layers
- unnecessary dependencies
- unnecessary decisions

Simplicity is not minimalism.
It is *control over entropy*.
`
  }, {
    title: "React Is Not a UI Library — It’s a State Machine",
    tag: "React",
    excerpt: "Once you see React as state transitions, UI design becomes predictable.",
    content: `
Most developers think React is about components.

But React is fundamentally about state transitions over time.

UI = f(state)

Key shift in thinking:
- Components are projections of state, not “units of UI”
- Re-renders are not events—they are consequences

Design principles:
- Minimize derived state duplication
- Keep state as close as possible to where it's used
- Prefer deterministic rendering over imperative UI updates

When state is clean:
- UI becomes predictable
- Bugs become traceable
- Refactors become mechanical instead of emotional
`
  },

  {
    title: "Frontend Architecture: Stop Organizing by File Type",
    tag: "Architecture",
    excerpt: "Folders like components/, hooks/, utils/ create hidden coupling.",
    content: `
Most frontend codebases degrade because they are organized by type, not domain.

Bad structure:
- components/
- hooks/
- utils/

This creates invisible coupling across features.

Better approach: domain-first structure

Example:
- checkout/
- dashboard/
- profile/

Inside each domain:
- UI components
- hooks
- state logic
- API calls

Why this works:
- Changes stay localized
- Ownership is clearer
- Refactoring becomes isolated

Architecture is not about order.
It’s about reducing blast radius.
`
  },

  {
    title: "The Cost of Re-Renders in React Is Not What You Think",
    tag: "Performance",
    excerpt: "Most performance problems are architectural, not technical.",
    content: `
React re-renders are often misunderstood as the problem.

The real issue is *uncontrolled propagation of state changes*.

Common mistake:
- Overusing global state
- Passing unstable props
- Recomputing expensive derived values in render

Better mental model:
- Treat state updates like events in a graph
- Each update has a propagation cost

Optimizations:
- Memoization only after identifying real hotspots
- Split state by update frequency
- Isolate volatile components from stable ones

Premature optimization is bad.
But premature architectural neglect is worse.
`
  },

  {
    title: "CSS Scaling Problem: Why Utility-First Won",
    tag: "Styling",
    excerpt: "CSS fails when teams rely on implicit structure.",
    content: `
CSS breaks down when implicit rules outgrow human memory.

Traditional CSS problems:
- Naming collisions
- Unpredictable overrides
- Hidden specificity wars

Utility-first systems (like Tailwind) win because:
- They remove naming decisions
- They enforce consistency by construction
- They shift styling from “designing classes” to “composing systems”

Tradeoff:
- Less abstraction
- More explicit markup

But explicit systems scale better in teams:
- Less mental overhead
- Faster onboarding
- Predictable rendering behavior
`
  },

  {
    title: "Design Systems Are Not Component Libraries",
    tag: "Design Systems",
    excerpt: "A design system is a constraint system, not a UI kit.",
    content: `
Most teams mistake design systems for component libraries.

That’s incorrect.

A real design system defines:
- spacing rules
- typography scale
- color semantics
- interaction patterns

Components are just outputs of those rules.

If your system has:
- buttons
- modals
- inputs

but no underlying constraints,
you don’t have a design system.

You have a UI collection.

Strong systems:
- reduce design decisions
- enforce consistency automatically
- scale across teams without coordination overhead
`
  },

  {
    title: "State Colocation Is the Secret to Scalable React Apps",
    tag: "React",
    excerpt: "Global state is often a symptom of poor structure.",
    content: `
One of the most common scaling failures in React apps:
overusing global state.

Better approach: colocation.

Rule of thumb:
- If only one feature uses it → keep it local
- If multiple distant features use it → consider global state

Why colocation works:
- reduces accidental coupling
- simplifies debugging
- improves reusability

Global state should be the exception, not the default.

Most apps scale better when state stays where it is born.
`
  }
];

const grid = document.getElementById("grid");
const overlay = document.getElementById("overlay");
const title = document.getElementById("title");
const tag = document.getElementById("tag");
const content = document.getElementById("content");

function openPost(post){
  title.innerText = post.title;
  tag.innerText = post.tag;
  content.innerText = post.content;
  overlay.style.display = "flex";
}

function closeModal(){
  overlay.style.display = "none";
}

posts.forEach(p=>{
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
    <div class="tag">${p.tag}</div>
    <h2>${p.title}</h2>
    <p>${p.excerpt}</p>
  `;
  div.onclick = ()=>openPost(p);
  grid.appendChild(div);
});

overlay.onclick = (e)=>{
  if(e.target === overlay) closeModal();
};
</script>

</body>
</html>
